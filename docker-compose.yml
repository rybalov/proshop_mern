services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'

  backend:
    build: .
    restart: unless-stopped
    ports:
      - '5001:5000'
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/proshop
    depends_on:
      - mongo
    volumes:
      - uploads:/app/uploads
      - ./backend/features.json:/app/backend/features.json

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    restart: 'no'
    volumes:
      - ./backend/features.json:/app/backend/features.json
    profiles:
      - mcp

volumes:
  mongo_data:
  uploads:
